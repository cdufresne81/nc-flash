name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r packaging/requirements-build.txt

    - name: Run tests
      run: pytest

    - name: Build with PyInstaller
      run: pyinstaller packaging/NCFlash.spec --noconfirm

    - name: Verify build output
      run: |
        if (!(Test-Path "dist\NCFlash\NCFlash.exe")) {
          Write-Error "NCFlash.exe not found"
          exit 1
        }
        Write-Output "Build verified: dist\NCFlash\NCFlash.exe"
      shell: pwsh

    - name: Install Inno Setup
      run: choco install innosetup --yes --no-progress
      shell: pwsh

    - name: Build installer
      run: |
        $env:APP_VERSION = "${{ github.ref_name }}".TrimStart("v")
        & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging/installer.iss
      shell: pwsh

    - name: Verify installer output
      run: |
        $installer = Get-ChildItem -Path Output -Filter "*.exe" | Select-Object -First 1
        if (!$installer) {
          Write-Error "Installer exe not found in Output/"
          exit 1
        }
        Write-Output "Installer built: $($installer.FullName) ($([math]::Round($installer.Length / 1MB, 1)) MB)"
      shell: pwsh

    - name: Upload Windows artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-installer
        path: Output/*.exe

  build-linux:
    name: Build Linux Package
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-dev \
          libegl1 \
          libxkbcommon0 \
          libfontconfig1 \
          libdbus-1-3 \
          libxcb-xinerama0 \
          libxcb-cursor0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r packaging/requirements-build.txt

    - name: Run tests
      run: pytest
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Build with PyInstaller
      run: pyinstaller packaging/NCFlash.spec --noconfirm

    - name: Verify build output
      run: |
        if [ ! -f "dist/NCFlash/NCFlash" ]; then
          echo "ERROR: NCFlash binary not found"
          exit 1
        fi
        echo "Build verified: dist/NCFlash/NCFlash"

    - name: Package as tar.gz
      run: |
        VERSION="${GITHUB_REF_NAME#v}"
        cd dist
        tar -czf "NCFlash-${VERSION}-linux-x86_64.tar.gz" NCFlash/
        ls -lh "NCFlash-${VERSION}-linux-x86_64.tar.gz"

    - name: Upload Linux artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-package
        path: dist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: release-assets

    - name: List release assets
      run: find release-assets -type f

    - name: Extract changelog for this version
      id: changelog
      run: |
        TAG="${GITHUB_REF_NAME}"
        VERSION="${TAG#v}"
        # Try versioned section first, then fall back to [Unreleased]
        NOTES=$(sed -n "/^## \[v${VERSION}\]/,/^## \[/{/^## \[v${VERSION}\]/d;/^## \[/d;p;}" CHANGELOG.md | sed '/^$/N;/^\n$/d')
        if [ -z "$NOTES" ]; then
          NOTES=$(sed -n "/^## \[Unreleased\]/,/^## \[/{/^## \[Unreleased\]/d;/^## \[/d;p;}" CHANGELOG.md | sed '/^$/N;/^\n$/d')
        fi
        if [ -z "$NOTES" ]; then
          NOTES="Release $TAG"
        fi
        echo "$NOTES" > release_notes.md
        echo "Release notes extracted for $TAG"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          release-assets/windows-installer/*.exe
          release-assets/linux-package/*.tar.gz
        body_path: release_notes.md
